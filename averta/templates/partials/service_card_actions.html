{% load i18n %}
{# Sifariş et (sol) + Ətraflı (sağ) #}
<div class="service-card-actions">
    <a href="{% url 'services:contact-page' %}?service={{ service.id }}#contact-booking" class="service-card-actions__order btn btn-primary rounded-pill btn-averta-order">
        {% trans "Sifariş et" %}
    </a>
    <a href="{% url 'services:service-detail' service.slug %}" class="service-card-actions__detail" aria-label="{{ service.name }} — {% trans 'ətraflı' %}">
        {% trans "Ətraflı" as detail_label %}
        {% include 'partials/card_link_action.html' with label=detail_label %}
    </a>
</div>
