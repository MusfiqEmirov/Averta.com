<div class="container-fluid bg-breadcrumb"{% if background_image %} style="background: linear-gradient(rgba(19, 53, 123, 0.7), rgba(19, 53, 123, 0.7)), url({{ background_image }}); background-position: center center; background-repeat: no-repeat; background-size: cover;"{% endif %}>
    <div class="container text-center py-5" style="max-width: 900px;">
        {% if page_motto %}
        <p class="page-banner-motto text-white mb-0">{{ page_motto }}</p>
        {% else %}
        <div class="bg-breadcrumb-spacer" aria-hidden="true"></div>
        {% endif %}
    </div>
</div>
